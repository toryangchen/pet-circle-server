name: Deploy Pet Circle Server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main

concurrency:
  group: pet-circle-server-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /home/ubuntu/apps/pet-circle-server
      SERVICE_NAME: pet-circle-server.service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${DEPLOY_PATH}/dist' '${DEPLOY_PATH}/prisma'"

      - name: Sync deployment files
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${DEPLOY_PATH}/dist/"

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            package.json package-lock.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${DEPLOY_PATH}/"

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            prisma/schema.prisma \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${DEPLOY_PATH}/prisma/schema.prisma"

      - name: Install production dependencies and restart service
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' SERVICE_NAME='${SERVICE_NAME}' bash -se" <<'REMOTE'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          npm ci --omit=dev --no-audit --no-fund
          node -e "require('@nestjs/core'); require('@prisma/client')"

          sudo systemctl restart "${SERVICE_NAME}"

          APP_PORT="$(awk -F= '/^PORT=/{print $2; exit}' .env 2>/dev/null || true)"
          APP_PORT="${APP_PORT:-3000}"
          HEALTH_URL="http://127.0.0.1:${APP_PORT}/api/health"

          for attempt in $(seq 1 30); do
            if sudo systemctl is-active --quiet "${SERVICE_NAME}" && curl -fsS "${HEALTH_URL}"; then
              exit 0
            fi
            echo "Waiting for ${SERVICE_NAME} to become ready (${attempt}/30)..."
            sleep 2
          done

          sudo systemctl status "${SERVICE_NAME}" --no-pager -l || true
          sudo journalctl -u "${SERVICE_NAME}" -n 120 --no-pager || true
          exit 1
          REMOTE
